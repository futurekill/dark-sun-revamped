# GitHub Actions workflow for creating Dark Sun Revamped Foundry VTT module releases.
#
# USAGE:
#   1. Make sure your changes are committed and pushed to main
#   2. Create and push a version tag: git tag v0.1.0 && git push --tags
#   3. The workflow automatically creates a GitHub Release with:
#      - module.json (with correct version and download URL baked in)
#      - dark-sun-revamped.zip (the installable module package)
#
# FoundryVTT installation URL (paste into Foundry → Install Module):
#   https://github.com/futurekill/dark-sun-revamped/releases/latest/download/module.json

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------------------
      # 1. Checkout the code at the tagged commit
      # ---------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # 2. Set up Node and install the Foundry CLI for pack compilation
      # ---------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Foundry CLI
        run: npm install @foundryvtt/foundryvtt-cli

      # ---------------------------------------------------------------
      # 3. Extract module info from the git tag
      # ---------------------------------------------------------------
      - name: Extract module info
        id: module
        run: |
          MODULE_ID=$(jq -r '.id' module.json)
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "id=$MODULE_ID"       >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"            >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"    >> "$GITHUB_OUTPUT"
          echo "📦 Building $MODULE_ID release for version $VERSION (tag: $TAG)"

      # ---------------------------------------------------------------
      # 4. Update module.json with correct version and download URL
      # ---------------------------------------------------------------
      - name: Update module.json
        run: |
          VERSION="${{ steps.module.outputs.version }}"
          TAG="${{ steps.module.outputs.tag }}"
          MODULE_ID="${{ steps.module.outputs.id }}"

          jq \
            --arg ver "$VERSION" \
            --arg manifest "https://github.com/${{ github.repository }}/releases/latest/download/module.json" \
            --arg download "https://github.com/${{ github.repository }}/releases/download/${TAG}/${MODULE_ID}.zip" \
            --arg url "https://github.com/${{ github.repository }}" \
            '.version = $ver | .manifest = $manifest | .download = $download | .url = $url' \
            module.json > module.json.tmp && mv module.json.tmp module.json

          echo "✅ Updated module.json:"
          jq '{id, version, manifest, download}' module.json

      # ---------------------------------------------------------------
      # 5. Compile compendium packs from _source JSON files
      # ---------------------------------------------------------------
      - name: Compile compendium packs
        run: |
          MODULE_ID="${{ steps.module.outputs.id }}"
          for pack_source in packs/*/_source; do
            [ -d "$pack_source" ] || continue
            pack_dir=$(dirname "$pack_source")
            pack_name=$(basename "$pack_dir")
            # Only compile if there are source files
            source_count=$(find "$pack_source" -name "*.json" | wc -l)
            if [ "$source_count" -eq 0 ]; then
              echo "⏭  Skipping $pack_name (no source files)"
              continue
            fi
            echo "⚙️  Compiling pack: $pack_name ($source_count entries)"
            npx fvtt package pack "$pack_name" \
              --type "Module" \
              --id "$MODULE_ID" \
              --in "$pack_source" \
              --out "packs"
          done
          echo ""
          echo "✅ Compiled packs:"
          for pack_dir in packs/*/; do
            db_count=$(find "$pack_dir" -maxdepth 1 -name "*.db" -o -name "CURRENT" | wc -l)
            echo "  $(basename $pack_dir): $db_count LevelDB files"
          done

      # ---------------------------------------------------------------
      # 6. Create the release zip (excluding source JSON files)
      # ---------------------------------------------------------------
      - name: Create release zip
        run: |
          MODULE_ID="${{ steps.module.outputs.id }}"
          zip -r "${MODULE_ID}.zip" \
            module.json \
            assets/ \
            scripts/ \
            styles/ \
            templates/ \
            lang/ \
            packs/ \
            README.md \
            LICENSE \
            -x "packs/*/_source/*" \
            -x "packs/*/_source" \
            2>/dev/null || true

          echo "✅ Created ${MODULE_ID}.zip"
          ls -lh "${MODULE_ID}.zip"

      # ---------------------------------------------------------------
      # 7. Publish the GitHub Release with both artifacts
      # ---------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.module.outputs.id }}.zip
            module.json
          generate_release_notes: true
          prerelease: ${{ contains(steps.module.outputs.version, 'alpha') || contains(steps.module.outputs.version, 'beta') || contains(steps.module.outputs.version, 'rc') }}
